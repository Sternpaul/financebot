<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; width: 320px; background: #15202b; color: white; }
    h3 { margin-top: 0; color: #1d9bf0; }
    label { font-size: 12px; color: #8899a6; display: block; margin-bottom: 4px; }
    input, textarea { width: 100%; margin-bottom: 12px; padding: 8px; box-sizing: border-box; background: #22303c; border: 1px solid #38444d; color: white; border-radius: 4px; }
    input:focus, textarea:focus { outline: none; border-color: #1d9bf0; }
    textarea { resize: vertical; min-height: 60px; font-family: monospace; font-size: 11px; }
    button { width: 100%; padding: 10px; background: #1d9bf0; color: white; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
    button:hover { background: #1a8cd8; }
  </style>
</head>
<body>
  <h3>FinanceBot Scraper</h3>
  <label>Supabase URL:</label>
  <input type="text" id="supabaseUrl" placeholder="https://xyz.supabase.co">
  <label>Supabase Publishable Key:</label>
  <input type="password" id="supabasePublishableKey" placeholder="sb_publishable_...">
  
  <label>Keyword Blocklist (comma separated):</label>
  <textarea id="keywordBlocklist" placeholder="football, messi, ronaldo, politics"></textarea>

  <label>Username Blocklist (comma separated):</label>
  <textarea id="usernameBlocklist" placeholder="elonmusk, dogecoin_fan"></textarea>

  <button id="saveBtn">Save Configuration</button>
  <div id="status" style="margin-top: 10px; color: #00ba7c; font-size: 12px; text-align: center;"></div>
  <script src="popup.js"></script>
</body>
</html>
