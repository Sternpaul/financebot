<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; padding: 15px; width: 250px; background: #15202b; color: white; margin: 0; text-align: center; }
    h3 { margin-top: 0; margin-bottom: 15px; color: #1d9bf0; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button { width: 100%; padding: 12px; background: #1d9bf0; color: white; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
    button:hover { background: #1a8cd8; }
    .settings-link { color: #8899a6; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
    .settings-link:hover { color: #1d9bf0; }
    #status { margin-top: 10px; color: #00ba7c; font-size: 12px; height: 14px;}
  </style>
</head>
<body>
  <h3>📈 FinanceBot</h3>
  
  <button id="savePageBtn">Save Current Page</button>
  
  <div id="status"></div>

  <div style="margin-top: 15px;">
    <span class="settings-link" id="settingsBtn">⚙️ Open Settings</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
