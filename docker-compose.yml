services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bot.main
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - telethon-session:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - investment-net
    deploy:
      resources:
        limits:
          memory: 512M      # Discord bot doesn't need ML

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bot.worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - telethon-session:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
      rsshub:
        condition: service_started
    networks:
      - investment-net
    deploy:
      resources:
        limits:
          memory: 1G        # Sufficient when using OpenAI API for embeddings

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - TWITTER_USERNAME=${TWITTER_USERNAME:-}
      - TWITTER_PASSWORD=${TWITTER_PASSWORD:-}
      # - PUPPETEER_WS_ENDPOINT=ws://browserless:3000 # Add if adding browserless sidecar later
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - investment-net
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - investment-net

volumes:
  redis-data:
  telethon-session:

networks:
  investment-net:
    driver: bridge
